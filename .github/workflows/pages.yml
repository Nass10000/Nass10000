name: Publicar portafolio
run-name: Publicar la copia actual de Manus en GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'portfolio/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

environment:
  name: github-pages
  url: ${{ steps.deployment.outputs.page_url }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Subir sitio
        uses: actions/upload-pages-artifact@v3
        with:
          path: portfolio

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
