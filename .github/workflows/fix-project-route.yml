name: Actualizar y publicar portafolio
run-name: Publicar versión nueva con formación completada

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-project-route.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Crear versión nueva del portafolio
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          root = Path('portfolio')
          source_bundle = root / 'assets/index-Dypqe6ft.js'
          versioned_bundle = root / 'assets/index-portfolio-v4.js'
          index_path = root / 'index.html'

          bundle = source_bundle.read_text(encoding='utf-8')

          pending = 'name:"Fundamentos de nube y ciencia de datos de producción",completed:!1'
          completed = 'name:"Fundamentos de nube y ciencia de datos de producción",completed:!0'
          bundle = bundle.replace(pending, completed, 1)

          old_intro = (
              'Soy un desarrollador dominicano apasionado por el código limpio y el aprendizaje continuo. '
              'Mi enfoque está en construir sistemas escalables que resuelvan problemas reales de negocio.'
          )
          new_intro = (
              'Soy un Desarrollador Web Full Stack y Científico de Datos dominicano, apasionado por el código limpio '
              'y el aprendizaje continuo. Mi enfoque está en construir sistemas escalables y soluciones basadas en '
              'datos que resuelvan problemas reales de negocio.'
          )

          old_detail = (
              'Actualmente combino mi experiencia en desarrollo Full Stack con mi formación en Ciencia de Datos, '
              'lo que me permite abordar proyectos desde la arquitectura de datos hasta la implementación de APIs robustas.'
          )
          new_detail = (
              'Combino mi experiencia en desarrollo Full Stack con mis competencias profesionales en Ciencia de Datos, '
              'lo que me permite abordar proyectos de extremo a extremo: desde la arquitectura, ingeniería y análisis '
              'de datos hasta la implementación de APIs robustas.'
          )

          bundle = bundle.replace(old_intro, new_intro)
          bundle = bundle.replace(old_detail, new_detail)
          bundle = bundle.replace(
              'con mi formación en Ciencia de Datos',
              'como Científico de Datos certificado'
          )

          if completed not in bundle:
              raise SystemExit('No quedó marcado el módulo de nube como completado')
          if 'con mi formación en Ciencia de Datos' in bundle:
              raise SystemExit('Todavía queda texto indicando formación en Ciencia de Datos')
          if 'scope:["Cloud (AWS/GCP)","Production ML Systems","Deep Learning","TensorFlow"]' not in bundle:
              raise SystemExit('La lista de conocimientos próximos cambió inesperadamente')

          versioned_bundle.write_text(bundle, encoding='utf-8')

          html = index_path.read_text(encoding='utf-8')
          html = re.sub(
              r'src="/Nass10000/assets/index-[^"]+\.js(?:\?[^"]*)?"',
              'src="/Nass10000/assets/index-portfolio-v4.js?v=20260711-4"',
              html,
              count=1,
          )
          html = re.sub(
              r'src="/Nass10000/requested-changes\.js(?:\?[^"]*)?"',
              'src="/Nass10000/requested-changes.js?v=20260711-4"',
              html,
              count=1,
          )
          index_path.write_text(html, encoding='utf-8')
          PY

      - name: Verificar archivos publicados
        run: |
          grep -q 'index-portfolio-v4.js?v=20260711-4' portfolio/index.html
          grep -q 'Fundamentos de nube y ciencia de datos de producción",completed:!0' portfolio/assets/index-portfolio-v4.js
          grep -q 'Científico de Datos dominicano' portfolio/assets/index-portfolio-v4.js
          ! grep -q 'con mi formación en Ciencia de Datos' portfolio/assets/index-portfolio-v4.js

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Subir sitio estático
        uses: actions/upload-pages-artifact@v3
        with:
          path: portfolio

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Guardar cambios permanentes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add portfolio/index.html portfolio/assets/index-portfolio-v4.js
          git diff --cached --quiet || git commit -m 'Publicar versión actualizada del portafolio'
          git push
