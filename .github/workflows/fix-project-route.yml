name: Actualizar y publicar portafolio
run-name: Actualizar perfil como científico de datos y publicar

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-project-route.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Actualizar contenido en el archivo principal
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          root = Path('portfolio')
          bundle_path = root / 'assets/index-Dypqe6ft.js'
          bundle = bundle_path.read_text(encoding='utf-8')

          # Mantener la ruta base correcta para GitHub Pages.
          bundle = bundle.replace(
              'Wv={hook:aw,searchHook:tw,parser:GA,base:"",ssrPath:void 0',
              'Wv={hook:aw,searchHook:tw,parser:GA,base:"/Nass10000",ssrPath:void 0'
          )

          # Cambios permanentes solicitados en el contenido original.
          bundle = bundle.replace('30+', '70+')
          bundle = bundle.replace(
              'Ciencia de Datos (en curso)',
              'Ciencia de Datos (completado)'
          )
          bundle = bundle.replace(
              'En formación activa en Ciencia de Datos con competencias en Power BI, ETL y Data Warehousing.',
              'Científico de Datos certificado, con competencias en Power BI, ETL y Data Warehousing.'
          )
          bundle = bundle.replace(
              'En formación activa en Ciencia de Datos',
              'Científico de Datos certificado'
          )

          # Cubrir variaciones con espacios no separables o saltos internos.
          bundle = re.sub(
              r'En\s+formación\s+activa\s+en\s+Ciencia\s+de\s+Datos\s+con\s+competencias\s+en\s+Power\s+BI,\s*ETL\s+y\s+Data\s+Warehousing\.',
              'Científico de Datos certificado, con competencias en Power BI, ETL y Data Warehousing.',
              bundle
          )

          bundle_path.write_text(bundle, encoding='utf-8')
          PY

      - name: Guardar cambios permanentes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add portfolio/assets/index-Dypqe6ft.js
          git diff --cached --quiet || git commit -m 'Actualizar perfil como científico de datos certificado'
          git push

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Subir sitio estático
        uses: actions/upload-pages-artifact@v3
        with:
          path: portfolio

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
