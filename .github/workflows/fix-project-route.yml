name: Actualizar y publicar portafolio
run-name: Marcar módulo de nube como completado y publicar

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-project-route.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Marcar únicamente el módulo de nube como completado
        run: |
          python - <<'PY'
          from pathlib import Path

          bundle_path = Path('portfolio/assets/index-Dypqe6ft.js')
          bundle = bundle_path.read_text(encoding='utf-8')

          pending = 'name:"Fundamentos de nube y ciencia de datos de producción",completed:!1'
          completed = 'name:"Fundamentos de nube y ciencia de datos de producción",completed:!0'

          if pending in bundle:
              bundle = bundle.replace(pending, completed, 1)
          elif completed not in bundle:
              raise SystemExit('No se encontró el estado del módulo de nube')

          # Verificación estricta: no tocar la lista de conocimientos próximos.
          if 'scope:["Cloud (AWS/GCP)","Production ML Systems","Deep Learning","TensorFlow"]' not in bundle:
              raise SystemExit('La lista de próximos conocimientos cambió inesperadamente')

          bundle_path.write_text(bundle, encoding='utf-8')
          PY

      - name: Verificar cambio exacto
        run: |
          python - <<'PY'
          from pathlib import Path
          bundle = Path('portfolio/assets/index-Dypqe6ft.js').read_text(encoding='utf-8')
          assert 'name:"Fundamentos de nube y ciencia de datos de producción",completed:!0' in bundle
          assert 'scope:["Cloud (AWS/GCP)","Production ML Systems","Deep Learning","TensorFlow"]' in bundle
          print('Módulo de nube completado; próximos conocimientos sin cambios.')
          PY

      - name: Guardar cambio permanente
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add portfolio/assets/index-Dypqe6ft.js
          git diff --cached --quiet || git commit -m 'Marcar fundamentos de nube como completado'
          git push

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Subir sitio estático
        uses: actions/upload-pages-artifact@v3
        with:
          path: portfolio

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
